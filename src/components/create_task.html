<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Create Task Card -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h2 class="fw-bold mb-4">Task Tracker</h2>

                    <div v-if="successMessage" class="alert alert-success">
                        {{ successMessage }}
                    </div>

                    <div v-if="errorMessage" class="alert alert-danger">
                        {{ errorMessage }}
                    </div>

                    <form @submit.prevent="createTask">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title</label>
                            <input
                                v-model="form.title"
                                type="text"
                                class="form-control"
                                placeholder="Enter task title"
                                maxlength="200"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea
                                v-model="form.description"
                                class="form-control"
                                rows="3"
                                placeholder="Enter task description"
                            ></textarea>
                        </div>

                        <div class="form-check mb-3">
                            <input
                                v-model="form.completed"
                                class="form-check-input"
                                type="checkbox"
                                id="completedCheck"
                            >
                            <label class="form-check-label" for="completedCheck">
                                Completed
                            </label>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary"
                            :disabled="loading"
                        >
                            {{ loading ? 'Saving...' : 'Create Task' }}
                        </button>
                    </form>
                </div>
            </div>

            <!-- Task List Card -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold mb-0">My Tasks</h4>
                        <button
                            type="button"
                            class="btn btn-outline-secondary btn-sm"
                            @click="fetchTasks"
                        >
                            Refresh
                        </button>
                    </div>

                    <div v-if="loadingTasks" class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div v-else-if="tasks.length === 0" class="text-muted">
                        No tasks found yet.
                    </div>

                    <div v-else class="d-grid gap-3">
                        <div
                            v-for="task in tasks"
                            :key="task.id"
                            class="border rounded p-3"
                        >
                            <div class="d-flex justify-content-between align-items-start gap-3">
                                <div class="flex-grow-1">
                                    <div class="d-flex align-items-center gap-2 mb-1">
                                        <h5 class="mb-0">{{ task.title }}</h5>

                                        <span
                                            class="badge"
                                            :class="task.completed ? 'bg-success' : 'bg-warning text-dark'"
                                        >
                                            {{ task.completed ? 'Completed' : 'Pending' }}
                                        </span>
                                    </div>

                                    <p class="text-muted mb-2">
                                        {{ task.description || 'No description provided.' }}
                                    </p>

                                    <small class="text-secondary">
                                        Created at: {{ formatDate(task.created_at) }}
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End Task List Card -->

        </div>
    </div>
</div>
